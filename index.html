<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian UGC Ad Generator - AI-Powered Ad Scripts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
            font-size: 1.1rem;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1rem;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .output {
            margin-top: 40px;
            display: none;
        }

        .output.show {
            display: block;
        }

        .output-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .script-box {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 25px;
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 1.05rem;
            color: #333;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }

        .feature {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .feature-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .feature-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .feature-desc {
            font-size: 0.9rem;
            color: #666;
        }

        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 2rem;
            }

            .features {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Indian UGC Ad Generator</h1>
        <p class="subtitle">AI-powered Hinglish ad scripts for Instagram Reels & TikTok</p>

        <div class="form-group">
            <label for="product">Enter Product Name:</label>
            <input
                type="text"
                id="product"
                placeholder="e.g., Face wash, Protein powder, skincare..."
                autocomplete="off"
            >
        </div>

        <button id="generateBtn" onclick="generateAd()">Generate Ad Script ✨</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Generating your ad script...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="output" id="output">
            <div class="output-label">📝 Generated Ad Script:</div>
            <div class="script-box" id="script"></div>
        </div>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">🤖</div>
                <div class="feature-title">AI Powered</div>
                <div class="feature-desc">Uses Mistral-7B for intelligent scripts</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🇮🇳</div>
                <div class="feature-title">Hinglish Style</div>
                <div class="feature-desc">Natural Hindi + English mix</div>
            </div>
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <div class="feature-title">Instant Results</div>
                <div class="feature-desc">Generate scripts in seconds</div>
            </div>
        </div>
    </div>

    <script>
        async function generateAd() {
            const product = document.getElementById('product').value.trim();
            const generateBtn = document.getElementById('generateBtn');
            const loading = document.getElementById('loading');
            const output = document.getElementById('output');
            const error = document.getElementById('error');
            const script = document.getElementById('script');

            // Reset UI
            error.classList.remove('show');
            output.classList.remove('show');

            // Validate input
            if (!product) {
                error.textContent = '❌ Please enter a product name';
                error.classList.add('show');
                return;
            }

            // Show loading state
            generateBtn.disabled = true;
            generateBtn.textContent = 'Generating...';
            loading.classList.add('show');

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ product }),
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to generate ad');
                }

                // Display the script
                script.textContent = data.script;
                output.classList.add('show');

            } catch (err) {
                error.textContent = `❌ Error: ${err.message}`;
                error.classList.add('show');
            } finally {
                // Reset loading state
                generateBtn.disabled = false;
                generateBtn.textContent = 'Generate Ad Script ✨';
                loading.classList.remove('show');
            }
        }

        // Allow Enter key to trigger generation
        document.getElementById('product').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateAd();
            }
        });
    </script>
</body>
</html>
